name: ci-quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  docs-and-ui-quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install root npm deps (retry)
        shell: pwsh
        run: |
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            npm ci --no-audit
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $attempts) { throw "npm ci failed after $attempts attempts" }
            Start-Sleep -Seconds (5 * $attempt)
          }
      - run: npm run docs:build
      - name: Install desktop npm deps (retry)
        shell: pwsh
        working-directory: ui/desktop
        run: |
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            npm ci --no-audit
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $attempts) { throw "ui/desktop npm ci failed after $attempts attempts" }
            Start-Sleep -Seconds (5 * $attempt)
          }
      - working-directory: ui/desktop
        run: npm test

  rust-workspace:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  desktop-tauri-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: ui/desktop/src-tauri

  release-artifacts-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p cerbena-launcher --test release_pipeline_contract_tests
