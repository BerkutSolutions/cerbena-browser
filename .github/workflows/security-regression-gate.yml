name: security-regression-gate

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  traffic-isolation-regression:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: ui/desktop/src-tauri
        run: cargo test traffic_isolation

  launcher-security-preflight:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install root npm deps (retry)
        shell: pwsh
        run: |
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            npm ci --no-audit
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $attempts) { throw "npm ci failed after $attempts attempts" }
            Start-Sleep -Seconds (5 * $attempt)
          }
      - name: Install desktop npm deps (retry)
        shell: pwsh
        working-directory: ui/desktop
        run: |
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            npm ci --no-audit
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $attempts) { throw "ui/desktop npm ci failed after $attempts attempts" }
            Start-Sleep -Seconds (5 * $attempt)
          }
      - shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\security-gates-preflight.ps1"
